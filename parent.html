<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kru Pug - พอร์ทัลผู้ปกครอง</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="index.css">
    <style>
        .parent-container { max-width: 700px; margin: 20px auto; padding: 0 16px; }
        .login-box { max-width: 400px; margin: 80px auto; text-align: center; }
        .login-box h1 { font-size: 2rem; margin-bottom: 8px; }
        .login-box p { color: var(--text-muted); margin-bottom: 24px; }
        .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 12px; padding: 16px; text-align: center; }
        .stat-card .val { font-size: 1.8rem; font-weight: 800; }
        .stat-card .lbl { font-size: 0.8rem; color: var(--text-muted); }
        .data-row { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 10px; padding: 12px 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="parent-container">
        <div class="floating-utils">
            <button onclick="const c=document.documentElement.getAttribute('data-theme')||'dark';const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('theme',n);this.textContent=n==='light'?'☀️':'🌙'">🌙</button>
        </div>

        <!-- Login -->
        <div id="parent-login">
            <div class="login-box">
                <div style="font-size:4rem;margin-bottom:16px;">👨‍👩‍👧</div>
                <h1>พอร์ทัลผู้ปกครอง</h1>
                <p>ติดตามผลการเรียนของบุตรหลาน</p>
                <form onsubmit="parentLogin(event)">
                    <div class="form-group"><input class="glass-input" id="p-student-id" placeholder="รหัสนักเรียน (เช่น S001)" required></div>
                    <div class="form-group"><input type="password" class="glass-input" id="p-code" placeholder="รหัสผู้ปกครอง (ค่าเริ่มต้น: 1234)" value="1234"></div>
                    <p id="p-error" style="color:#ef4444;display:none;margin-bottom:12px;"></p>
                    <button type="submit" class="btn-glow btn-full"><i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</button>
                </form>
                <p style="margin-top:16px;"><a href="index.html" style="color:var(--text-muted);">&larr; กลับหน้าหลัก</a></p>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="parent-dashboard" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
                <div>
                    <h2 id="child-name" style="margin:0;"></h2>
                    <p style="color:var(--text-muted);margin:0;font-size:0.9rem;">ผลการเรียนของบุตรหลาน</p>
                </div>
                <button class="btn-outline" onclick="parentLogout()"><i class="fa-solid fa-right-from-bracket"></i></button>
            </div>

            <div class="stat-cards">
                <div class="stat-card"><div class="val" id="pc-quizzes" style="color:#3b82f6;">0</div><div class="lbl">ทำข้อสอบ</div></div>
                <div class="stat-card"><div class="val" id="pc-avg" style="color:#10b981;">0%</div><div class="lbl">คะแนนเฉลี่ย</div></div>
                <div class="stat-card"><div class="val" id="pc-attendance" style="color:#f59e0b;">0</div><div class="lbl">วันเข้าเรียน</div></div>
                <div class="stat-card"><div class="val" id="pc-homework" style="color:#a855f7;">0</div><div class="lbl">การบ้านส่ง</div></div>
            </div>

            <div class="glass-card" style="padding:16px;margin-bottom:16px;">
                <h3 style="margin:0 0 12px;">📊 ผลสอบล่าสุด</h3>
                <div id="pc-quiz-list"></div>
            </div>

            <div class="glass-card" style="padding:16px;margin-bottom:16px;">
                <h3 style="margin:0 0 12px;">✅ เช็คชื่อล่าสุด</h3>
                <div id="pc-attendance-list"></div>
            </div>

            <div class="glass-card" style="padding:16px;">
                <h3 style="margin:0 0 12px;">📝 การบ้าน</h3>
                <div id="pc-homework-list"></div>
            </div>
        </div>
    </div>

    <script>
    if(localStorage.getItem('theme')==='light') document.documentElement.setAttribute('data-theme','light');
    let PARENT_CHILD = null;

    async function parentLogin(e) {
        e.preventDefault();
        const errEl = document.getElementById('p-error');
        errEl.style.display = 'none';
        try {
            const res = await fetch('/api/parent/login', {
                method: 'POST', headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ student_id: document.getElementById('p-student-id').value, parent_code: document.getElementById('p-code').value })
            });
            const data = await res.json();
            if (data.success) {
                PARENT_CHILD = data.student;
                localStorage.setItem('parentChild', JSON.stringify(PARENT_CHILD));
                showParentDashboard();
            } else { errEl.textContent = data.error; errEl.style.display = 'block'; }
        } catch(err) { errEl.textContent = 'เชื่อมต่อไม่ได้'; errEl.style.display = 'block'; }
    }

    function parentLogout() { localStorage.removeItem('parentChild'); location.reload(); }

    async function showParentDashboard() {
        document.getElementById('parent-login').style.display = 'none';
        document.getElementById('parent-dashboard').style.display = 'block';
        document.getElementById('child-name').textContent = '👧 ' + PARENT_CHILD.name;
        try {
            const res = await fetch('/api/parent/child/' + PARENT_CHILD.id);
            const data = await res.json();
            const qr = data.quizResults || [];
            const avg = qr.length ? Math.round(qr.reduce(function(s,r){ return s + (r.score_percent || Math.round(r.score/r.total*100)); }, 0) / qr.length) : 0;
            document.getElementById('pc-quizzes').textContent = qr.length;
            document.getElementById('pc-avg').textContent = avg + '%';
            document.getElementById('pc-attendance').textContent = (data.attendance || []).length;
            document.getElementById('pc-homework').textContent = (data.homework || []).filter(function(h){ return h.status === 'submitted' || h.status === 'graded'; }).length;
            // Quiz list
            document.getElementById('pc-quiz-list').innerHTML = qr.length ? qr.map(function(r){
                var pct = r.score_percent || Math.round(r.score/r.total*100);
                return '<div class="data-row"><span>'+r.title+'</span><span style="font-weight:700;color:'+(pct>=70?'#10b981':'#ef4444')+';">'+r.score+'/'+r.total+' ('+pct+'%)</span></div>';
            }).join('') : '<p style="color:var(--text-muted);">ยังไม่มีผลสอบ</p>';
            // Attendance
            document.getElementById('pc-attendance-list').innerHTML = (data.attendance || []).map(function(a){
                return '<div class="data-row"><span>📅 '+a.check_date+'</span><span>⏰ '+a.check_time+'</span></div>';
            }).join('') || '<p style="color:var(--text-muted);">ยังไม่มีข้อมูล</p>';
            // Homework
            document.getElementById('pc-homework-list').innerHTML = (data.homework || []).map(function(h){
                var statusText = h.status==='graded'?'✅ ตรวจแล้ว: '+h.grade+'/'+h.total:h.status==='submitted'?'📤 ส่งแล้ว':'⏰ รอส่ง';
                var statusColor = h.status==='graded'?'#3b82f6':h.status==='submitted'?'#10b981':'#f59e0b';
                return '<div class="data-row"><div><strong>'+h.title+'</strong><br><span style="font-size:0.8rem;color:'+statusColor+';">'+statusText+'</span></div><span style="color:var(--text-muted);font-size:0.8rem;">'+h.due_date+'</span></div>';
            }).join('') || '<p style="color:var(--text-muted);">ไม่มีการบ้าน</p>';
        } catch(e) { console.error(e); }
    }

    var saved = JSON.parse(localStorage.getItem('parentChild') || 'null');
    if (saved) { PARENT_CHILD = saved; showParentDashboard(); }
    </script>
</body>
</html>
