<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Portal - Kru Pug Hub</title>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { min-height:100vh; background:var(--bg-primary); color:var(--text-primary); font-family:'Segoe UI',Tahoma,sans-serif; }
        .teacher-container { max-width:900px; margin:0 auto; padding:24px; }
        .login-card { max-width:400px; margin:80px auto; text-align:center; }
        .form-group { margin-bottom:16px; text-align:left; }
        .form-group label { display:block; margin-bottom:6px; font-weight:600; font-size:0.85rem; }
        .glass-input { width:100%; padding:10px 14px; border:1px solid var(--glass-border); border-radius:8px; background:var(--glass-bg); color:var(--text-primary); font-size:1rem; box-sizing:border-box; }
        .btn-glow { padding:12px 24px; border:none; border-radius:10px; font-size:1rem; font-weight:600; color:#fff; cursor:pointer; width:100%; }
        .classroom-card { background:var(--glass-bg); border:1px solid var(--glass-border); border-radius:12px; padding:16px; margin-bottom:12px; cursor:pointer; transition:transform 0.2s; }
        .classroom-card:hover { transform:translateY(-2px); border-color:#a855f7; }
        .student-row { display:flex; justify-content:space-between; align-items:center; padding:10px 12px; border-radius:8px; margin-bottom:6px; background:var(--glass-bg); border:1px solid var(--glass-border); }
        .badge { display:inline-block; padding:2px 8px; border-radius:6px; font-size:0.7rem; font-weight:600; }
        .back-btn { background:none; border:none; color:var(--text-muted); cursor:pointer; font-size:0.9rem; margin-bottom:16px; }
        .back-btn:hover { color:var(--text-primary); }
        @media (max-width:600px) { .teacher-container { padding:12px; } .student-row { flex-direction:column; gap:8px; align-items:flex-start; } }
    </style>
</head>
<body>
    <div class="teacher-container">
        <div id="teacher-login" class="login-card glass-card">
            <h2><i class="fa-solid fa-chalkboard-user" style="color:#a855f7;"></i></h2>
            <h2>Teacher Portal</h2>
            <p style="color:var(--text-muted);margin-bottom:24px;">ล็อกอินด้วยอีเมลและรหัสผ่าน</p>
            <div class="form-group"><label>อีเมล</label><input class="glass-input" id="t-email" placeholder="teacher@krupug.com" value="teacher@krupug.com"></div>
            <div class="form-group"><label>รหัสผ่าน</label><input type="password" class="glass-input" id="t-pass" placeholder="รหัสผ่าน" value="1234"></div>
            <button class="btn-glow" style="background:linear-gradient(135deg,#a855f7,#6366f1);" onclick="teacherLogin()"><i class="fa-solid fa-right-to-bracket"></i> เข้าสู่ระบบ</button>
            <p id="t-error" style="color:#ef4444;font-size:0.85rem;margin-top:12px;display:none;"></p>
            <p style="margin-top:16px;font-size:0.8rem;color:var(--text-muted);">Demo: teacher@krupug.com / 1234</p>
            <a href="index.html" style="color:var(--text-muted);font-size:0.85rem;"><i class="fa-solid fa-arrow-left"></i> กลับหน้าหลัก</a>
        </div>
        <div id="teacher-dashboard" style="display:none;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
                <div><h2><i class="fa-solid fa-chalkboard-user" style="color:#a855f7;"></i> สวัสดี <span id="t-name">ครู</span> 👋</h2>
                <p style="color:var(--text-muted);">Teacher Portal | <a href="index.html" style="color:#a855f7;">กลับหน้าหลัก</a></p></div>
                <button onclick="teacherLogout()" style="background:#ef4444;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;"><i class="fa-solid fa-right-from-bracket"></i> ออก</button>
            </div>
            <div id="t-classrooms" class="glass-card" style="padding:20px;">
                <h3><i class="fa-solid fa-school" style="color:#3b82f6;"></i> ห้องเรียนของฉัน</h3>
                <div id="t-classroom-list" style="margin-top:16px;">กำลังโหลด...</div>
            </div>
            <div id="t-students" class="glass-card" style="padding:20px;margin-top:16px;display:none;">
                <button class="back-btn" onclick="document.getElementById('t-students').style.display='none';document.getElementById('t-classrooms').style.display='block';"><i class="fa-solid fa-arrow-left"></i> กลับ</button>
                <h3 id="t-class-title"></h3>
                <div id="t-student-list" style="margin-top:16px;"></div>
            </div>
        </div>
    </div>
<script>
let teacherToken=localStorage.getItem('teacher_token'),teacherName=localStorage.getItem('teacher_name');
if(teacherToken&&teacherName)showTeacherDashboard();
async function teacherLogin(){const e=document.getElementById('t-email').value,p=document.getElementById('t-pass').value,err=document.getElementById('t-error');err.style.display='none';try{const r=await fetch('/api/teacher/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(d.success){teacherToken=d.token;teacherName=d.teacher.name;localStorage.setItem('teacher_token',teacherToken);localStorage.setItem('teacher_name',teacherName);showTeacherDashboard();}else{err.textContent=d.error;err.style.display='block';}}catch(x){err.textContent=x.message;err.style.display='block';}}
function showTeacherDashboard(){document.getElementById('teacher-login').style.display='none';document.getElementById('teacher-dashboard').style.display='block';document.getElementById('t-name').textContent=teacherName;loadMyClassrooms();}
function teacherLogout(){localStorage.removeItem('teacher_token');localStorage.removeItem('teacher_name');location.reload();}
async function loadMyClassrooms(){const l=document.getElementById('t-classroom-list');try{const r=await fetch('/api/teacher/my-classrooms',{headers:{'Authorization':'Bearer '+teacherToken}});const d=await r.json();l.innerHTML=d.map(c=>`<div class="classroom-card" onclick="loadStudents(${c.id},'${c.name}')"><div style="display:flex;justify-content:space-between;align-items:center;"><div><strong><i class="fa-solid fa-door-open" style="color:#3b82f6;"></i> ${c.name}</strong></div><span class="badge" style="background:rgba(168,85,247,0.2);color:#a855f7;">${c.student_count} คน</span></div></div>`).join('')||'<p style="color:var(--text-muted);">ไม่มีห้องเรียน</p>';}catch(e){l.innerHTML='<p style="color:#ef4444;">❌ '+e.message+'</p>';}}
async function loadStudents(id,name){document.getElementById('t-classrooms').style.display='none';document.getElementById('t-students').style.display='block';document.getElementById('t-class-title').innerHTML='<i class="fa-solid fa-users" style="color:#10b981;"></i> '+name;const l=document.getElementById('t-student-list');l.innerHTML='กำลังโหลด...';try{const r=await fetch('/api/teacher/classroom/'+id+'/students',{headers:{'Authorization':'Bearer '+teacherToken}});const d=await r.json();l.innerHTML=d.map(s=>`<div class="student-row"><div><strong>${s.name}</strong><span style="color:var(--text-muted);font-size:0.8rem;margin-left:8px;">${s.student_id}</span></div><div style="display:flex;gap:8px;align-items:center;"><span class="badge" style="background:rgba(245,158,11,0.2);color:#f59e0b;">Lv.${s.level||1}</span><span class="badge" style="background:rgba(16,185,129,0.2);color:#10b981;">${s.avg_score||0}%</span><span class="badge" style="background:rgba(168,85,247,0.2);color:#a855f7;">${s.exp||0} EXP</span></div></div>`).join('')||'<p style="color:var(--text-muted);">ไม่มีนักเรียน</p>';}catch(e){l.innerHTML='<p style="color:#ef4444;">❌ '+e.message+'</p>';}}
</script>
</body>
</html>
